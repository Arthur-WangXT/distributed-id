server:
  port: 8080

spring:
  application:
    name: distributed-id-server
  datasource:
    url: jdbc:h2:mem:distributed_id;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

snowflake:
  worker-id: 0

segment:
  biz-type: default
  step: 1000

redis:
  id:
    key: distributed:id:generator
    step: 1000
  host: localhost
  port: 6379
  timeout: 3000ms